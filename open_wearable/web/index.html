<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <script>
    (function () {
      const baseElement = document.querySelector('base');
      if (!baseElement) return;

      const rootRouteSegments = new Set([
        'connect-devices',
        'connectors',
        'device-detail',
        'fota',
        'log-files',
        'recordings',
        'settings',
        'view',
        'whats-new',
      ]);
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const firstSegment = pathSegments[0] || '';
      // Keep one build working at root domains and one-segment Pages subpaths.
      const baseHref = firstSegment && !rootRouteSegments.has(firstSegment)
        ? `/${firstSegment}/`
        : '/';

      baseElement.setAttribute('href', baseHref);
      window.__openWearableBaseHref = baseHref;

      function addLink(rel, href, options) {
        const link = document.createElement('link');
        link.rel = rel;
        link.href = `${baseHref}${href}`;
        if (options && options.sizes) {
          link.sizes = options.sizes;
        }
        document.head.appendChild(link);
      }

      addLink('apple-touch-icon', 'icons/Icon-192.png');
      addLink('icon', 'favicon.ico', { sizes: 'any' });
      addLink('apple-touch-icon', 'apple-touch-icon.png');
      addLink('manifest', 'manifest.json');
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="open_wearable">

  <title>OpenWearable | App</title>
</head>
<body>
  <script>
    (function () {
      const script = document.createElement('script');
      script.src = `${window.__openWearableBaseHref || '/'}flutter_bootstrap.js`;
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
