name: Android Build and Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
      release_type:
        description: "Release type"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - production

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy_for_android:
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ github.event.inputs.release_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up ruby env
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.3
          bundler-cache: true

      - name: Set up Android build
        uses: ./.github/actions/android-build-prepare
        with:
          app-dir: open_wearable
          clean: "true"
          analyze: "true"

      - name: Decode and save OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PATH
        run: |
          echo "${{ secrets.OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PATH__FILE }}" | base64 --decode > android_keystore_temp.keystore
          echo "OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PATH=$(realpath android_keystore_temp.keystore)" >> $GITHUB_ENV

      - name: Decode and save OPEN_WEARABLE_APP_ANDROID_DEPLOYMENT_KEY_PATH
        run: |
          echo "${{ secrets.OPEN_WEARABLE_APP_ANDROID_DEPLOYMENT_KEY_PATH__FILE }}" | base64 --decode > android_deployment_key.json
          echo "OPEN_WEARABLE_APP_ANDROID_DEPLOYMENT_KEY_PATH=$(realpath android_deployment_key.json)" >> $GITHUB_ENV

      - name: Set up fastlane
        run: (cd open_wearable/android && bundle install)

      - name: Build & deploy Android (Internal)
        if: ${{ github.event.inputs.release_type == 'internal' }}
        run: |
          cd open_wearable/android
          bundle exec fastlane internal_deploy
        env:
          OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PASSWORD }}

      - name: Build & deploy Android (Production)
        if: ${{ github.event.inputs.release_type == 'production' }}
        run: |
          cd open_wearable/android
          bundle exec fastlane production_deploy
        env:
          OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.OPEN_WEARABLE_APP_ANDROID_KEYSTORE_PASSWORD }}

      - name: Open and merge version bump PR
        if: ${{ github.event.inputs.release_type == 'production' }}
        shell: bash
        env:
          VERSION_FILE: open_wearable/pubspec.yaml
          BASE_BRANCH: ${{ github.event.inputs.branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          line=$(grep '^version:' "$VERSION_FILE")
          raw_version=${line#version: }
          version=${raw_version//\"/}
          echo "Current version: $version"

          semver=${version%%+*}
          build=${version#*+}
          if [ "$semver" = "$build" ]; then
            echo "::error::Version '$version' must include build metadata, for example 1.2.3+45."
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$semver"
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "::error::Version '$version' must use numeric major.minor.patch values."
            exit 1
          fi

          new_patch=$((patch + 1))
          new_version="${major}.${minor}.${new_patch}+${build}"
          bump_branch="automation/bump-version-${new_version}-${GITHUB_RUN_ID}"
          commit_message="chore(version): bump version to ${new_version}"

          git switch -c "$bump_branch"
          sed -i "s|^version: .*|version: $new_version|" "$VERSION_FILE"
          echo "New version set to: $new_version"

          git add "$VERSION_FILE"
          git commit -m "$commit_message"
          git push --set-upstream origin "$bump_branch"

          pr_url=$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$bump_branch" \
            --title "$commit_message" \
            --body "Bumps the app version after the production Play Store release.")

          gh pr review "$pr_url" \
            --approve \
            --body "Automated approval for version bump after production release."

          gh pr merge "$pr_url" \
            --squash \
            --delete-branch \
            --subject "$commit_message" \
            --body "Merged automatically after the production Play Store release."
