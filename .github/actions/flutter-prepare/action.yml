name: Flutter Prepare
description: Set up the pinned Flutter SDK and fetch project dependencies.

inputs:
  app-dir:
    description: Path to the Flutter application directory.
    required: true
  clean:
    description: Whether to clean Flutter build outputs before fetching dependencies.
    required: false
    default: "false"
  analyze:
    description: Whether to run flutter analyze after dependencies are installed.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Read Flutter version
      id: flutter_version
      shell: bash
      run: echo "version=$(cat "${{ inputs.app-dir }}/.flutter_version")" >> "$GITHUB_OUTPUT"

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: ${{ steps.flutter_version.outputs.version }}
        cache: true

    - name: Show Flutter version
      shell: bash
      run: flutter --version

    - name: Clean Flutter outputs
      if: ${{ inputs.clean == 'true' }}
      shell: bash
      working-directory: ${{ inputs.app-dir }}
      run: flutter clean

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.app-dir }}
      run: flutter pub get

    - name: Analyze source
      if: ${{ inputs.analyze == 'true' }}
      shell: bash
      working-directory: ${{ inputs.app-dir }}
      run: flutter analyze
